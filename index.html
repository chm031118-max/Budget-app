<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Web App | javascript</title>
  <link href="./style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="budget-container">
    <div class="app-title">
      <a href="/">Budget<b>App</b></a>
      <button id="lang-toggle" style="margin-left: 20px;">🌐 English</button>
    </div>

    <div class="budget-header">
      <div class="balance">
        <div class="title" data-i18n="balance">Balance</div>
        <div class="value"><small>$</small>0</div>
      </div>

      <div class="account">
        <div class="income">
          <div class="title" data-i18n="income">Income</div>
          <div class="income-total"><small>$</small>0</div>
        </div>

        <div class="chart"></div>

        <div class="outcome">
          <div class="title" data-i18n="outcome">Outcome</div>
          <div class="outcome-total"><small>$</small>0</div>
        </div>
      </div>
    </div>

    <main class="budget-dashboard">
      <div class="dash-title" data-i18n="dashboard">Dashboard</div>

      <div class="toggle">
        <button type="button" class="first-tab" id="tab-expenses" data-i18n="expenses_tab">
          Expenses
        </button>
        <button type="button" class="second-tab" id="tab-income" data-i18n="income_tab">
          Income
        </button>
        <button type="button" class="third-tab focus" id="tab-all" data-i18n="all_tab">
          All
        </button>
      </div>

      <div class="hide" id="expense">
        <ul class="list"></ul>

        <div class="input">
          <div class="input-group">
            <label for="expense-title-input" class="visually-hidden">
              Expense title
            </label>
            <input
              type="text"
              id="expense-title-input"
              name="title"
              placeholder="title"
              data-i18n-placeholder="title_placeholder"
            />
            <p id="expense-title-error" class="error-message" aria-live="polite"></p>
          </div>

          <div class="input-group">
            <label for="expense-amount-input" class="visually-hidden">
              Expense amount
            </label>
            <input
              type="number"
              id="expense-amount-input"
              name="amount"
              placeholder="$0"
              data-i18n-placeholder="amount_placeholder"
            />
            <p id="expense-amount-error" class="error-message" aria-live="polite"></p>
          </div>

          <button
            type="button"
            class="add-expense"
            aria-label="Add expense"
            data-i18n-aria="add_expense_aria"
          >
            +
          </button>
        </div>
      </div>

      <div class="hide" id="income">
        <ul class="list"></ul>

        <div class="input">
          <div class="input-group">
            <label for="income-title-input" class="visually-hidden">
              Income title
            </label>
            <input
              type="text"
              id="income-title-input"
              name="title"
              placeholder="title"
              data-i18n-placeholder="title_placeholder"
            />
            <p id="income-title-error" class="error-message" aria-live="polite"></p>
          </div>

          <div class="input-group">
            <label for="income-amount-input" class="visually-hidden">
              Income amount
            </label>
            <input
              type="number"
              id="income-amount-input"
              name="amount"
              placeholder="$0"
              data-i18n-placeholder="amount_placeholder"
            />
            <p id="income-amount-error" class="error-message" aria-live="polite"></p>
          </div>

          <button
            type="button"
            class="add-income"
            aria-label="Add income"
            data-i18n-aria="add_income_aria"
          >
            +
          </button>
        </div>
      </div>

      <div id="all">
        <ul class="list" aria-label="All transactions list"></ul>
      </div>
    </main>
  </div>

  <!-- Cookie Consent Banner -->
  <div
    id="cookie-banner"
    class="cookie-banner"
    role="dialog"
    aria-live="polite"
    aria-label="Cookie consent notice"
  >
    <div class="cookie-banner-content">
      <p>
        This website uses local storage to remember your budget data, language preference,
        and cookie consent choice.
      </p>

      <div class="cookie-banner-actions">
        <button type="button" id="accept-cookies">
          Accept
        </button>
        <a href="privacy.html" class="privacy-link">
          Privacy Policy
        </a>
      </div>
    </div>
  </div>

  <script src="src/validation.js"></script>
  <script src="./chart.js"></script>
  <script src="./budget.js"></script>
</body>

</html>
