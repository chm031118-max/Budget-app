<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Web App | javascript</title>
  <link href="./style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="budget-container">
    <div class="app-title">
      <a href="/">Budget<b>App</b></a>
    </div>
    <div class="budget-header">
      <div class="balance">
        <div class="title">Balance</div>
        <div class="value"><small>$</small>0</div>
      </div>
      <div class="account">
        <div class="income">
          <div class="title">Income</div>
          <div class="income-total"><small>$</small>0</div>
        </div>
        <div class="chart"></div>
        <div class="outcome">
          <div class="title">Outcome</div>
          <div class="outcome-total"><small>$</small>0</div>
        </div>
      </div>
    </div>

    <main class="budget-dashboard">
      <div class="dash-title">Dashboard</div>

      <div class="toggle">
        <button type="button" class="first-tab" id="tab-expenses">Expenses</button>
        <button type="button" class="second-tab" id="tab-income">Income</button>
        <button type="button" class="third-tab focus" id="tab-all">All</button>
      </div>

      <div class="hide" id="expense">
        <ul class="list"></ul>
        <div class="input">
          <div class="input-group">
            <label for="expense-title-input" class="visually-hidden">Expense title</label>
            <input type="text" id="expense-title-input" name="title" placeholder="title" />
          </div>
          <div class="input-group">
            <label for="expense-amount-input" class="visually-hidden">Expense amount</label>
            <input type="number" id="expense-amount-input" name="amount" placeholder="$0" />
          </div>
          <button type="button" class="add-expense" aria-label="Add expense">+</button>
        </div>
      </div>

      <div class="hide" id="income">
        <ul class="list"></ul>
        <div class="input">
          <div class="input-group">
            <label for="income-title-input" class="visually-hidden">Income title</label>
            <input type="text" id="income-title-input" name="title" placeholder="title" />
          </div>
          <div class="input-group">
            <label for="income-amount-input" class="visually-hidden">Income amount</label>
            <input type="number" id="income-amount-input" name="amount" placeholder="$0" />
          </div>
          <button type="button" class="add-income" aria-label="Add income">+</button>
        </div>
      </div>

      <div id="all">
        <ul class="list" aria-label="All transactions list"></ul>
      </div>
    </main>
  </div>
  <script src="./chart.js"></script>
  <script src="./budget.js"></script>
</body>

</html>
